services:
  energy-availability-broker:
    image: git-reg.ptw.maschinenbau.tu-darmstadt.de/eta-fabrik/projekte/energy-availability-broker/poetry2.3.2:py3.11
    container_name: energy-availability-broker
    restart: unless-stopped
    ports:
      - "8023:8000"
    environment:
      FORECAST_SOLAR_API_TOKEN: "${FORECAST_SOLAR_API_TOKEN}"
      ENTSOE_API_TOKEN: "${ENTSOE_API_TOKEN}"
