services:
  energy-information-service:
    image: git-reg.ptw.maschinenbau.tu-darmstadt.de/eta-fabrik/projekte/energy-information-service/poetry2.3.2:py3.11
    container_name: energy-information-service
    restart: unless-stopped
    ports:
      - "8023:8000"
    environment:
      FORECAST_SOLAR_API_TOKEN: "${FORECAST_SOLAR_API_TOKEN}"
      ENTSOE_API_TOKEN: "${ENTSOE_API_TOKEN}"
